<style>
  :root{
    --sega-blue:#17569b;
    --sega-blue-dark:#083a8c;
    --bg:#f5f8fc;
    --card:#ffffff;
    --text:#1c2430;
    --muted:#5f6b7a;
    --border:#dbe4f0;
    --shadow:0 10px 30px rgba(0,0,0,0.10);
    --radius:18px;
    --max:1200px;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  .sc-header{
    background:linear-gradient(135deg,var(--sega-blue),var(--sega-blue-dark));
    color:#fff;
    position:sticky;
    top:0;
    z-index:1000;
    box-shadow:0 4px 18px rgba(0,0,0,0.15);
  }

  .sc-header-inner{
    max-width:var(--max);
    margin:0 auto;
    padding:16px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:24px;
  }

  .sc-brand{
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    color:#fff;
    min-width:0;
  }

  .sc-logo{
    height:52px;
    width:auto;
    display:block;
    border-radius:10px;
    background:rgba(255,255,255,0);
    padding:4px;
  }

  .sc-title-wrap{
    min-width:0;
  }

  .sc-site-title{
    margin:0;
    font-size:1.5rem;
    line-height:1.1;
    font-weight:800;
    letter-spacing:0.4px;
  }

  .sc-site-tag{
    margin:4px 0 0;
    font-size:0.92rem;
    color:rgba(255,255,255,0.85);
  }

  .sc-nav{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:flex-end;
  }

  .sc-nav a{
    color:#fff;
    text-decoration:none;
    padding:10px 14px;
    border-radius:999px;
    font-weight:700;
    font-size:0.95rem;
    transition:background 0.2s ease, transform 0.2s ease;
  }

  .sc-nav a:hover{
    background:rgba(255,255,255,0.14);
    transform:translateY(-1px);
  }

  .sc-page{
    max-width:var(--max);
    margin:32px auto 0;
    padding:0 24px 50px;
    text-align:center;
  }

  .sc-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:34px;
  }

  .sc-page-header{
    margin-bottom:24px;
  }

  .sc-page-header h2{
    margin:0 0 8px;
    font-size:2rem;
    color:var(--sega-blue-dark);
  }

  .sc-page-header p{
    margin:0;
    font-size:1rem;
    color:var(--muted);
    line-height:1.6;
  }

  .sc-page-content{
    min-height:300px;
  }
  
  .sc-member-wrap{
  margin-top:28px;
}

.sc-member-card{
  max-width:760px;
  margin:0 auto;
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  padding:24px;
  display:flex;
  align-items:center;
  gap:24px;
  text-align:left;
}

.sc-member-photo-wrap{
  flex:0 0 140px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.sc-member-photo{
  width:140px;
  height:140px;
  border-radius:18px;
  object-fit:cover;
  display:block;
  background:#eef4ff;
  border:1px solid #dbe4f0;
}

.sc-member-photo-placeholder{
  width:140px;
  height:140px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#eef4ff;
  color:var(--sega-blue-dark);
  border:1px solid #dbe4f0;
  font-size:2.4rem;
  font-weight:800;
}

.sc-member-info{
  flex:1 1 auto;
}

.sc-member-name{
  margin:0 0 10px;
  font-size:1.8rem;
  color:var(--sega-blue-dark);
  line-height:1.1;
}

.sc-member-link{
  color:var(--text);
  text-decoration:none;
  font-size:1rem;
  line-height:1.6;
}

.sc-member-link:hover{
  text-decoration:underline;
}

.sc-member-note{
  margin:10px 0 0;
  color:var(--muted);
  font-size:0.95rem;
  line-height:1.5;
}

.sc-results-message{
  margin:0;
  color:var(--muted);
  text-align:center;
}

@media (max-width: 900px){
  .sc-member-card{
    flex-direction:column;
    text-align:center;
    padding:20px;
    gap:18px;
  }

  .sc-member-photo-wrap{
    flex-basis:auto;
  }

  .sc-member-photo,
  .sc-member-photo-placeholder{
    width:120px;
    height:120px;
  }

  .sc-member-name{
    font-size:1.45rem;
  }
}

  @media (max-width: 900px){
    .sc-header-inner{
      flex-direction:column;
      align-items:flex-start;
      padding:14px 16px;
      gap:14px;
    }

    .sc-brand{
      width:100%;
    }

    .sc-logo{
      height:44px;
    }

    .sc-site-title{
      font-size:1.25rem;
    }

    .sc-site-tag{
      font-size:0.85rem;
    }

    .sc-nav{
      justify-content:flex-start;
      width:100%;
      gap:8px;
    }

    .sc-nav a{
      padding:8px 12px;
      font-size:0.9rem;
    }

    .sc-page{
      margin:20px auto 0;
      padding:0 16px 40px;
    }

    .sc-card{
      padding:22px 18px;
    }

    .sc-page-header h2{
      font-size:1.5rem;
    }

    .sc-page-header p{
      font-size:0.95rem;
      line-height:1.6;
    }
  }
</style>

<header class="sc-header">
  <div class="sc-header-inner">
    <a href="/" class="sc-brand">
      <img class="sc-logo" src="segacrew_logo.png" alt="Sega Crew logo">
      <div class="sc-title-wrap">
        <h1 class="sc-site-title">Sega Crew</h1>
        <p class="sc-site-tag">Events • Archive • Speedruns • Community</p>
      </div>
    </a>

    <nav class="sc-nav">
      <a href="/event-archive.html">Event Archive</a>
      <a href="/member-directory.html">Member Directory</a>
      <a href="/game-directory.html">Game Directory</a>
      <a href="/sega-crew-stats.html">Sega Crew Stats</a>
    </nav>
  </div>
</header>

<main class="sc-page">
  <section class="sc-card">
    <div class="sc-page-header">
      <h2>SEGA CREW MEMBERS</h2>
    </div>

    <div id="controls"></div>
    <div id="member-directory-content" class="sc-page-content"></div>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="members.html"></script>
  </section>
</main>
